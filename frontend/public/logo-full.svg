<svg viewBox="-5 -5 550 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="npGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066FF" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="npGradLight" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="100%" stop-color="#A78BFA" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
      .logo-text {
        font-family: 'Outfit', system-ui, sans-serif;
        font-weight: 800;
        font-size: 82px;
        letter-spacing: -1.5px;
      }
    </style>
  </defs>

  <!-- Document Outline -->
  <path d="M 45 100 L 35 100 C 26.7 100 20 93.3 20 85 L 20 35 C 20 26.7 26.7 20 35 20 L 65 20 L 90 45 L 90 60" stroke="url(#npGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Document Fold -->
  <path d="M 65 20 L 65 35 C 65 40.5 69.5 45 75 45 L 90 45" stroke="url(#npGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Horizontal Lines -->
  <line x1="55" y1="35" x2="65" y2="35" stroke="url(#npGrad)" stroke-width="8" stroke-linecap="round"/>
  <line x1="40" y1="55" x2="70" y2="55" stroke="url(#npGrad)" stroke-width="8" stroke-linecap="round"/>

  <!-- Four-Pointed Star -->
  <path d="M 22 35 Q 35 35 35 22 Q 35 35 48 35 Q 35 35 35 48 Q 35 35 22 35 Z" fill="url(#npGrad)"/>

  <!-- Orbit Ring -->
  <path d="M 15 65 A 45 18 -15 0 0 70 95" stroke="url(#npGrad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 85 85 A 45 18 -15 0 0 105 55" stroke="url(#npGrad)" stroke-width="6" stroke-linecap="round"/>

  <!-- Paper Plane -->
  <path d="M 50 85 L 105 45 L 72 82 Z" fill="url(#npGradLight)"/>
  <path d="M 105 45 L 80 105 L 72 82 Z" fill="url(#npGrad)"/>

  <!-- Wordmark -->
  <text x="125" y="90" class="logo-text">
    <tspan fill="currentColor">Note</tspan><tspan fill="url(#npGrad)">Pilot</tspan>
  </text>
</svg>
